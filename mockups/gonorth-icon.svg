<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="GoNorth">
  <defs>
    <linearGradient id="skyG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4f0e8"/>
      <stop offset="100%" stop-color="#a8dcc8"/>
    </linearGradient>
    <linearGradient id="mtnB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#52b788"/>
      <stop offset="100%" stop-color="#2D6A4F"/>
    </linearGradient>
    <linearGradient id="mtnF" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#1a3a2a"/>
    </linearGradient>
    <clipPath id="rc">
      <rect x="0" y="0" width="64" height="64" rx="14"/>
    </clipPath>
  </defs>

  <!-- Background sky -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#skyG)"/>

  <!-- Back ridge -->
  <path d="M0,48 C8,34 14,26 22,21 C30,16 36,24 44,18 C52,12 60,26 64,20 L64,64 L0,64 Z"
        fill="url(#mtnB)" opacity="0.5" clip-path="url(#rc)"/>

  <!-- Front ridge -->
  <path d="M0,64 L0,52 C6,46 10,39 18,33 C24,28 28,37 34,31 C40,25 46,35 52,29 C58,23 62,33 64,37 L64,64 Z"
        fill="url(#mtnF)" clip-path="url(#rc)"/>

  <!-- Water wave -->
  <path d="M0,60 C10,56 22,62 32,58 C42,54 54,60 64,57 L64,64 L0,64 Z"
        fill="#48CAE4" opacity="0.55" clip-path="url(#rc)"/>

  <!-- Sun -->
  <circle cx="46" cy="16" r="8"  fill="#E9C46A" opacity="0.9"/>
  <circle cx="46" cy="16" r="12" fill="#E9C46A" opacity="0.16"/>
  <circle cx="46" cy="4"  r="1.4" fill="#E9C46A" opacity="0.5"/>
  <circle cx="57" cy="9"  r="1.4" fill="#E9C46A" opacity="0.5"/>
  <circle cx="34" cy="6"  r="1.4" fill="#E9C46A" opacity="0.45"/>

  <!-- Tree -->
  <path d="M13,47 C13,47 9,40 13,36 C15,34 16,38 16,38 C16,38 18,32 20,34 C22,36 19,43 19,43 L19,47 Z"
        fill="#1a3a2a" opacity="0.6" clip-path="url(#rc)"/>
</svg>
